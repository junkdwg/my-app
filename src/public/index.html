<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps CI/CD Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0f1e;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border-bottom: 1px solid #1e3a5f;
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo { display: flex; align-items: center; gap: 12px; }
    .logo h1 { font-size: 20px; color: #38bdf8; font-weight: 700; }
    .logo span { font-size: 13px; color: #64748b; }

    .header-right { display: flex; align-items: center; gap: 12px; }

    .badge {
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-blue { background: #1e40af; color: #93c5fd; }
    .badge-green { background: #14532d; color: #86efac; }

    .dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
      50% { opacity: 0.8; box-shadow: 0 0 0 4px rgba(34,197,94,0); }
    }

    .container { max-width: 1100px; margin: 32px auto; padding: 0 24px; }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px; height: 100%;
      border-radius: 4px 0 0 4px;
    }

    .stat-card.blue::before { background: #38bdf8; }
    .stat-card.green::before { background: #22c55e; }
    .stat-card.red::before { background: #ef4444; }
    .stat-card.purple::before { background: #a78bfa; }

    .stat-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: 700; }
    .stat-card.blue .stat-value { color: #38bdf8; }
    .stat-card.green .stat-value { color: #22c55e; }
    .stat-card.red .stat-value { color: #ef4444; }
    .stat-card.purple .stat-value { color: #a78bfa; }
    .stat-sub { font-size: 12px; color: #475569; margin-top: 4px; }

    /* Table Card */
    .card {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .card-header {
      padding: 16px 24px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-header h2 { font-size: 15px; color: #94a3b8; font-weight: 600; }

    .refresh-btn {
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .refresh-btn:hover { background: #334155; color: #e2e8f0; }

    table { width: 100%; border-collapse: collapse; }

    thead { background: #0a0f1e; }

    th {
      padding: 12px 20px;
      text-align: left;
      font-size: 11px;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid #1e293b;
    }

    td {
      padding: 14px 20px;
      font-size: 14px;
      border-bottom: 1px solid #0f172a;
    }

    tr:last-child td { border-bottom: none; }

    tr:hover td { background: #1e293b22; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-success { background: #14532d; color: #86efac; }
    .status-failed { background: #450a0a; color: #fca5a5; }

    .version-tag {
      background: #1e3a5f;
      color: #93c5fd;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-family: monospace;
    }

    .commit-tag {
      background: #1e293b;
      color: #94a3b8;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-family: monospace;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #475569;
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

    .uptime-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #64748b;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <h1>CI/CD Dashboard</h1>
    <span id="app-name-sub">my-app</span>
  </div>
  <div class="header-right">
    <span class="uptime-bar"><span class="dot"></span>Running — Uptime: <span id="uptime">...</span></span>
    <span class="badge badge-blue" id="version-badge">v-.-.–</span>
  </div>
</header>

<div class="container">

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card blue">
      <div class="stat-label">Total Deploys</div>
      <div class="stat-value" id="stat-total">-</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Success</div>
      <div class="stat-value" id="stat-success">-</div>
    </div>
    <div class="stat-card red">
      <div class="stat-label">Failed</div>
      <div class="stat-value" id="stat-failed">-</div>
    </div>
    <div class="stat-card purple">
      <div class="stat-label">Latest Version</div>
      <div class="stat-value" id="stat-version" style="font-size:20px;margin-top:6px;">-</div>
      <div class="stat-sub" id="stat-latest-time">-</div>
    </div>
  </div>

  <!-- Deploy Log Table -->
  <div class="card">
    <div class="card-header">
      <h2>Deploy History</h2>
      <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Version</th>
          <th>Status</th>
          <th>Branch</th>
          <th>Commit</th>
          <th>Duration</th>
          <th>Deploy Time</th>
        </tr>
      </thead>
      <tbody id="deploy-table">
        <tr><td colspan="7">
          <div class="empty-state">
            Loading Deploy History...
          </div>
        </td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
  async function loadHealth() {
    const res = await fetch('/health');
    const data = await res.json();
    const uptime = Math.floor(data.uptime);
    const h = Math.floor(uptime / 3600);
    const m = Math.floor((uptime % 3600) / 60);
    const s = uptime % 60;
    document.getElementById('uptime').textContent = `${h}h ${m}m ${s}s`;
    document.getElementById('version-badge').textContent = 'v' + data.version;
    document.getElementById('app-name-sub').textContent = data.app;
  }

  async function loadStats() {
    const res = await fetch('/api/stats');
    const data = await res.json();
    document.getElementById('stat-total').textContent = data.total;
    document.getElementById('stat-success').textContent = data.success;
    document.getElementById('stat-failed').textContent = data.failed;
    document.getElementById('stat-version').textContent = data.latest ? 'v' + data.latest.version : '-';
    document.getElementById('stat-latest-time').textContent = data.latest
      ? new Date(data.latest.deployedAt).toLocaleString('th-TH')
      : 'Have no deploy yet';
  }

  async function loadDeploys() {
    const res = await fetch('/api/deploys');
    const logs = await res.json();
    const tbody = document.getElementById('deploy-table');

    if (logs.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7">
        <div class="empty-state">
          Don't have any history Deploy yet — Try push code!
        </div>
      </td></tr>`;
      return;
    }

    tbody.innerHTML = logs.map((log, i) => `
      <tr>
        <td style="color:#475569">${logs.length - i}</td>
        <td><span class="version-tag">v${log.version}</span></td>
        <td>
          <span class="status-badge ${log.status === 'success' ? 'status-success' : 'status-failed'}">
            ${log.status === 'success' ? '✓' : '✗'} ${log.status}
          </span>
        </td>
        <td style="color:#94a3b8">${log.branch}</td>
        <td><span class="commit-tag">${log.commit}</span></td>
        <td style="color:#94a3b8">${log.duration}</td>
        <td style="color:#64748b">${new Date(log.deployedAt).toLocaleString('th-TH')}</td>
      </tr>
    `).join('');
  }

  async function loadAll() {
    await Promise.all([loadHealth(), loadStats(), loadDeploys()]);
  }

  loadAll();
  setInterval(loadHealth, 1000);
  setInterval(() => { loadStats(); loadDeploys(); }, 10000);
</script>

</body>
</html>
