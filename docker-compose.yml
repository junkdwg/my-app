version: '3.8'

services:

  app:
    build: .
    container_name: my-app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - APP_NAME=my-app
      - APP_VERSION=${APP_VERSION}
      - MONGO_URI=mongodb://mongo:27017/mydb
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: my-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data: