name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Read version from package.json
        shell: powershell
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV
          Write-Host "Version: $version"
        
      - name: Install dependencies
        shell: powershell
        run: npm install

      - name: Run tests
        shell: powershell
        run: npm test
        
      - name: Stop old container
        shell: powershell
        run: |
          docker compose down
          exit 0

      - name: Build Docker image
        shell: powershell
        run: docker build -t my-app:${{ env.APP_VERSION }} -t my-app:latest .

      - name: Deploy with Docker Compose
        shell: powershell
        run: docker compose up -d --build

      - name: Verify deployment
        shell: powershell
        run: docker compose ps

      - name: Log deploy success
        shell: powershell
        run: |
          $body = @{
            version = "${{ env.APP_VERSION }}"
            status = "success"
            branch = "main"
            commit = "${{ github.sha }}".Substring(0, 7)
            duration = "auto"
          } | ConvertTo-Json
          Invoke-RestMethod -Uri "http://localhost:3000/api/deploys" -Method POST -Body $body -ContentType "application/json"

      - name: Log deploy failed
        if: failure()
        shell: powershell
        run: |
          $body = @{
            version = "${{ env.APP_VERSION }}"
            status = "failed"
            branch = "main"
            commit = "${{ github.sha }}".Substring(0, 7)
            duration = "auto"
          } | ConvertTo-Json
          try {
            Invoke-RestMethod -Uri "http://localhost:3000/api/deploys" -Method POST -Body $body -ContentType "application/json"
          } catch {
            Write-Host "Could not log to app (app may not be running)"
          }
          exit 0